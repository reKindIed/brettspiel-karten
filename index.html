<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Brettspiel Karten Generator</title>

<style>

body{
font-family:Arial;
background:#2c2c2c;
display:flex;
flex-direction:column;
align-items:center;
margin-top:60px;
color:white;
}

button{
font-size:22px;
padding:15px 25px;
margin-bottom:40px;
cursor:pointer;
}

button:disabled{
background:#777;
color:#ccc;
cursor:not-allowed;
}

.kartenbereich{
display:flex;
justify-content:center;
width:100%;
}

.karte{

width:320px;
min-height:420px;

background:white;
color:black;

border-radius:15px;
border:4px solid #222;

padding:20px;

box-shadow:0px 10px 25px rgba(0,0,0,0.5);

transition:transform 0.8s;

margin:auto;

}

.kartentitel{
font-size:26px;
font-weight:bold;
margin-bottom:15px;
text-align:center;
}

.aktion{
margin:8px 0;
font-size:18px;
border-bottom:1px solid #ddd;
padding-bottom:5px;
width:100%;
}

</style>

</head>

<body>

<button id="ziehenBtn" onclick="karteZiehen()">Karte ziehen</button>

<div class="kartenbereich">
<div id="karte" class="karte">
<div class="kartentitel">Neue Karte</div>
</div>
</div>

<script>

const aktionen = [

"+3 Gold",
"-2 Gold",
"Bewege dich 2 Felder vor",
"Bewege dich 1 Feld zurück",
"Tausche Position mit einem Spieler",
"Ziehe eine Bonuskarte",
"Verliere einen Zug",
"Alle Spieler erhalten 1 Gold",
"Stiehl 2 Gold von einem Spieler",
"Bewege dich zum nächsten Ereignisfeld"

];

let rotation = 0;

function zufallsAktionenAnzahl(){

let rand = Math.random()*100;

if(rand < 40) return 1;
if(rand < 70) return 2;
if(rand < 85) return 3;
if(rand < 95) return 4;
return 5;

}

function karteZiehen(){

let btn = document.getElementById("ziehenBtn");

btn.disabled = true;

let countdown = 2;

btn.innerText = "Warte "+countdown+"s";

let interval = setInterval(()=>{

countdown--;

if(countdown>0){
btn.innerText="Warte "+countdown+"s";
}else{
btn.innerText="Karte ziehen";
btn.disabled=false;
clearInterval(interval);
}

},1000);


/* Karte rotieren */

rotation += 360;

let karte = document.getElementById("karte");

karte.style.transform = "rotateY("+rotation+"deg)";


/* Neue Karte generieren */

setTimeout(()=>{

let anzahl = zufallsAktionenAnzahl();

let kopie = [...aktionen];

let gezogeneAktionen = [];

for(let i=0;i<anzahl;i++){

let index = Math.floor(Math.random()*kopie.length);

gezogeneAktionen.push(kopie[index]);

kopie.splice(index,1);

}

let html="<div class='kartentitel'>Ereigniskarte</div>";

gezogeneAktionen.forEach(a=>{
html+="<div class='aktion'>• "+a+"</div>";
});

karte.innerHTML = html;

},400);

}

</script>

</body>

</html>
